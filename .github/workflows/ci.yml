name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['main']

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          REDIS_HOST: fake-host
          REDIS_PORT: '6379'
          REDIS_USERNAME: default
          REDIS_PASSWORD: fake-password
          REDIS_DATABASE: '0'

      - name: Unit Test
        run: npm test -- --passWithNoTests
